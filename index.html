<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnadına TV 2</title>
    <meta name="referrer" content="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070707;
            --bg-card: #121212;
            --primary: #d60000; /* İnadına TV Kırmızısı */
            --text-main: #ffffff;
            --text-muted: #888888;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* NAVBAR & ARAMA KUTUSU */
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--primary); flex-wrap: wrap; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: white; }
        .menu-icon { font-size: 28px; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .menu-icon:hover { color: var(--primary); }
        .menu-text { font-size: 14px; font-weight: 600; text-transform: uppercase; }

        .search-container { flex: 1; max-width: 400px; position: relative; }
        .search-input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; font-size: 14px; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(214, 0, 0, 0.4); }

        /* YAN MENÜ (KATEGORİLER - OTOMATİK DOLACAK) */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #0c0c0c; overflow-x: hidden; transition: 0.4s; padding-top: 60px; border-right: 2px solid var(--primary); box-shadow: 5px 0 20px rgba(0,0,0,0.8); }
        .sidebar a { padding: 12px 25px; text-decoration: none; font-size: 15px; color: #ccc; display: block; transition: 0.3s; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: var(--primary); padding-left: 35px; border-left: 4px solid white; font-weight: 600; }
        .sidebar .closebtn { position: absolute; top: 10px; right: 20px; font-size: 36px; border: none; background: transparent; padding: 0; color: white; }
        .sidebar h2 { color: white; padding-left: 25px; margin-bottom: 15px; font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }

        /* FİLM IZGARASI & KARTLAR */
        .main-content { padding: 30px 5%; transition: margin-left 0.4s; min-height: 80vh; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .category-title { font-size: 22px; font-weight: 600; color: white; border-left: 4px solid var(--primary); padding-left: 12px; text-transform: uppercase; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 18px; }
        
        .movie-card { background: var(--bg-card); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #222; }
        .movie-card:hover { transform: translateY(-7px); box-shadow: 0 10px 25px rgba(214, 0, 0, 0.4); border-color: var(--primary); }
        .img-wrapper { position: relative; width: 100%; height: 210px; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .movie-card:hover img { opacity: 0.3; }
        
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 45px; color: var(--primary); transition: 0.3s; }
        .movie-card:hover .play-overlay { transform: translate(-50%, -50%) scale(1); }
        
        .movie-info { padding: 12px; background: linear-gradient(to top, rgba(0,0,0,1) 60%, transparent); position: absolute; bottom: 0; width: 100%; }
        .movie-title { font-size: 13px; font-weight: 600; color: white; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; text-shadow: 1px 1px 3px black; }
        
        /* DAHA FAZLA GÖSTER BUTONU */
        .load-more-container { text-align: center; margin-top: 40px; }
        .btn-load-more { background: transparent; color: white; border: 2px solid var(--primary); padding: 12px 35px; font-size: 16px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        .btn-load-more:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* FİLM DETAY MODALI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #111; width: 100%; max-width: 850px; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; max-height: 90vh; border: 1px solid #333; box-shadow: 0 0 30px black; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 10; transition: 0.3s; }
        .close-modal:hover { color: var(--primary); }
        
        .modal-body { display: flex; padding: 30px; gap: 25px; flex-wrap: wrap; }
        .modal-poster { width: 180px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); border: 1px solid #333; }
        .modal-details { flex: 1; min-width: 200px; }
        .modal-title { font-size: 26px; font-weight: 800; color: white; margin-bottom: 10px; }
        .modal-badge { display: inline-block; background: var(--primary); font-size: 12px; padding: 4px 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .modal-desc { font-size: 14px; color: #ccc; line-height: 1.6; max-height: 140px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        
        .btn-play { background: var(--primary); color: white; border: none; padding: 14px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(214, 0, 0, 0.4); }
        .btn-play:hover { background: #a30000; transform: scale(1.05); }

        /* İFRAME OYNATICI ALANI */
        .player-wrapper { display: none; width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        
        /* İframe Tam Ekran Uyumluluğu */
        iframe:fullscreen { width: 100vw; height: 100vh; }

        @media (max-width: 768px) {
            .search-container { order: 3; max-width: 100%; margin-top: 10px; }
            .menu-text { display: none; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 12px; }
            .img-wrapper { height: 175px; }
            .modal-body { flex-direction: column; align-items: center; text-align: center; }
            .btn-play { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="menu-icon" onclick="openNav()">&#9776; <span class="menu-text">Kategoriler</span></div>
            <div class="logo">İNADINA <span>TV 2</span></div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Aradığınız filmi yazın...">
        </div>
    </nav>

    <!-- Kategoriler JSON'dan Otomatik Olarak Buraya Dolacak -->
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <h2>Kategoriler</h2>
        <a onclick="filterCategory('Tümü', this)" class="cat-link active">🔥 Tüm Filmler</a>
        <div id="category-list">
            <!-- Kategoriler JS ile buraya yüklenecek -->
        </div>
    </div>

    <div class="main-content" id="main">
        <div class="header-box">
            <h2 class="category-title" id="current-cat-title">Tüm Filmler</h2>
        </div>
        
        <div class="movie-grid" id="movie-container">
            <!-- Filmler buraya yüklenecek -->
        </div>
        
        <div class="load-more-container" id="load-more-container" style="display: none;">
            <button class="btn-load-more" onclick="loadMore()">Daha Fazla Göster ↓</button>
        </div>
    </div>

    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-body" id="modal-info">
                <img id="modal-img" class="modal-poster" src="" alt="Afiş">
                <div class="modal-details">
                    <div class="modal-title" id="modal-title">Başlık</div>
                    <div class="modal-badge" id="modal-cat">Kategori</div>
                    <div class="modal-desc" id="modal-desc">Açıklama</div>
                    <button class="btn-play" id="play-btn">▶ Tam Ekran İzle</button>
                </div>
            </div>
            <div class="player-wrapper" id="player-container">
                <iframe id="video-player" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let filteredMovies = [];
        let displayedCount = 0;
        const MOVIES_PER_PAGE = 30; // Tek seferde 30 film yükler

        // Yan Menü
        function openNav() { document.getElementById("mySidebar").style.width = "260px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        // Veritabanını Başlat (Botun oluşturduğu kategorileri otomatik yan menüye dizer)
        fetch('veritabani.json')
            .then(response => response.json())
            .then(data => {
                allMovies = data.filmler;
                filteredMovies = allMovies;
                
                // Botun çektiği JSON'dan tüm benzersiz kategorileri bul ve listele
                // NOT: Eğer veritabani.json dosyasında "kategoriler" listesi varsa direkt onu kullanıyoruz.
                let categoriesArray = data.kategoriler || [...new Set(data.filmler.map(m => m.kategori))];
                renderSidebar(categoriesArray); 
                
                renderMovies(true);
            })
            .catch(err => {
                document.getElementById('movie-container').innerHTML = '<h3 style="color:red; margin-left:15px;">Veritabanı Yüklenemedi! Botun Github üzerinden filmleri taramasını bekleyin.</h3>';
            });

        // Sidebar Dinamik Render
        function renderSidebar(cats) {
            const list = document.getElementById('category-list');
            list.innerHTML = ""; // İçini temizle
            cats.forEach(cat => {
                const a = document.createElement('a');
                a.className = 'cat-link';
                a.innerText = cat;
                a.onclick = function() { filterCategory(cat, this); };
                list.appendChild(a);
            });
        }

        // Kategori Filtresi
        function filterCategory(cat, element) {
            document.querySelectorAll('.cat-link').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            document.getElementById('current-cat-title').innerText = cat;
            document.getElementById('searchInput').value = ""; 
            closeNav();

            if (cat === 'Tümü') filteredMovies = allMovies;
            else filteredMovies = allMovies.filter(m => m.kategori === cat);
            
            renderMovies(true); 
        }

        // Arama Kutusu Mantığı
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            document.getElementById('current-cat-title').innerText = searchTerm ? `Arama: "${searchTerm}"` : "Tüm Filmler";
            
            document.querySelectorAll('.cat-link').forEach(el => el.classList.remove('active'));
            
            filteredMovies = allMovies.filter(m => m.baslik.toLowerCase().includes(searchTerm));
            renderMovies(true);
        });

        // Filmleri Ekrana Basma (Daha Fazla Göster Mantığı)
        function renderMovies(reset = false) {
            const container = document.getElementById('movie-container');
            const loadMoreBtn = document.getElementById('load-more-container');
            
            if (reset) {
                container.innerHTML = '';
                displayedCount = 0;
            }

            if(filteredMovies.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#ccc;">Bu kategoride henüz film bulunamadı.</p>';
                loadMoreBtn.style.display = 'none';
                return;
            }

            const moviesToShow = filteredMovies.slice(displayedCount, displayedCount + MOVIES_PER_PAGE);
            
            moviesToShow.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(movie);
                card.innerHTML = `
                    <div class="img-wrapper">
                        <img src="${movie.afis}" alt="${movie.baslik}" loading="lazy">
                        <div class="play-overlay">▶</div>
                        <div class="movie-info">
                            <div class="movie-title">${movie.baslik}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            displayedCount += moviesToShow.length;

            if (displayedCount < filteredMovies.length) {
                loadMoreBtn.style.display = 'block';
            } else {
                loadMoreBtn.style.display = 'none';
            }
        }

        function loadMore() {
            renderMovies(false);
        }

        // Modal (Popup) İşlemleri
        const modal = document.getElementById('movie-modal');
        const playerContainer = document.getElementById('player-container');
        const videoPlayer = document.getElementById('video-player');
        const modalInfo = document.getElementById('modal-info');
        const playBtn = document.getElementById('play-btn');

        function openModal(movie) {
            document.getElementById('modal-img').src = movie.afis;
            document.getElementById('modal-title').innerText = movie.baslik;
            document.getElementById('modal-cat').innerText = movie.kategori;
            document.getElementById('modal-desc').innerText = movie.aciklama;
            
            modalInfo.style.display = 'flex';
            playerContainer.style.display = 'none';
            videoPlayer.src = ''; 
            
            playBtn.onclick = () => {
                modalInfo.style.display = 'none'; 
                playerContainer.style.display = 'block'; 
                videoPlayer.src = movie.iframe; 
                
                // Tam Ekran İsteği (Native Fullscreen API tetiklemesi)
                if (playerContainer.requestFullscreen) {
                    playerContainer.requestFullscreen();
                } else if (playerContainer.mozRequestFullScreen) { /* Firefox */
                    playerContainer.mozRequestFullScreen();
                } else if (playerContainer.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
                    playerContainer.webkitRequestFullscreen();
                } else if (playerContainer.msRequestFullscreen) { /* IE/Edge */
                    playerContainer.msRequestFullscreen();
                }
            };
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            videoPlayer.src = ''; 
            playerContainer.style.display = 'none';
            
            // Eğer tam ekrandan çıkmamışsa, ESC'ye basılmış gibi kodsal olarak çıkış yap
            if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
