name: Otomatik Film Botu

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

# Botun dosyaları değiştirebilmesi için YAZMA YETKİSİ
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4
        with:
          # GitHub yetki tokenini açıkça tanımlıyoruz
          token: ${{ secrets.GITHUB_TOKEN }}
          # Geçmişteki commit'lerle çakışmaması için tam derinlik
          fetch-depth: 0 

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Modülleri Yükle
        run: pip install -r requirements.txt

      - name: Botu Çalıştır ve Filmleri Çek
        run: python bot.py

      # Bu eklenti "Exit Code 128" hatasını tamamen çözer!
      # Otomatik olarak dosyayı tanır, değişmişse GitHub'a ekler.
      - name: Yeni Verileri GitHub'a Kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Otomatik Güncelleme: Yeni filmler eklendi"
          file_pattern: veritabani.json
