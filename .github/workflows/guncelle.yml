name: Otomatik Film Botu

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      - name: Kamuflaj VPN Kurulumu (Cloudflare WARP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install cloudflare-warp -y
          warp-cli --accept-tos registration new || warp-cli --accept-tos register
          warp-cli --accept-tos mode proxy || warp-cli --accept-tos set-mode proxy
          warp-cli --accept-tos connect
          sleep 5

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Modülleri Yükle
        run: pip install -r requirements.txt

      - name: Botu Çalıştır ve Filmleri Çek
        run: python bot.py

      # Çakışma Önleyici: Push işleminden önce Github'daki son hali çeker.
      - name: Çakışmaları Önle
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true

      - name: Yeni Verileri GitHub'a Kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Otomatik Güncelleme: 9000+ Film Arşivi Eklendi"
          file_pattern: veritabani.json
